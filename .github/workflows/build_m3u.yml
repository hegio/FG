name: Auto Update M3U Playlist

on:
  schedule:
    # 每 48 小时自动运行一次 (国际标准时间 UTC 转换为北京时间)
    - cron: '0 */48 * * *'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予工作流向仓库提交更新文件的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Update Script
        run: |
          cat << 'EOF' > generate_m3u.py
          import os
          import re
          import urllib.request

          # 需要处理的目标分类名称（按您指定的顺序排序）
          target_names = [
              "🐬各大源合集 海豚影视永久免费如有收费的都是骗子",
              "🐬电视家",
              "🐬地方直播",
              "🐬薄荷直播",
              "🐬咪咕直播",
              "🐬体育台",
              "🐬国际TV",
              "🐬裤佬TV",
              "🐬裤佬TV2",
              "🐬Mytv",
              "🐬易发源 有🔞",
              "🐬港奥台国际",
              "🐬4GTV(梯子任何节点)1080p",
              "🐬4GTV(免梯子)1080p",
              "🐬jackTV(梯子)",
              "develop202",
          ]

          # 【目录结构配置开关】
          # False = 默认 2 级目录（如：group-title="🐬电视家"）
          # True  = 模拟 3 级目录（如：group-title="🐬电视家 - 央视频道"，能更精细地展示源文件内的内部子分类）
          USE_3_LEVEL_DIRECTORY = True

          # 敏感词过滤器（用于彻底去除 18+ 敏感或成人频道，确保“无18a”）
          NSFW_KEYWORDS = ["18+", "🔞", "adult", "福利", "成人", "av", "xxx", "sex", "erotic", "午夜", "18a"]

          def fetch_content(url):
              """安全抓取网页或文件内容"""
              try:
                  req = urllib.request.Request(
                      url, 
                      headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
                  )
                  with urllib.request.urlopen(req, timeout=15) as response:
                      return response.read().decode('utf-8', errors='ignore')
              except Exception as e:
                  print(f"抓取链接失败 {url}: {e}")
                  return ""

          def clean_group_name(name):
              """清理主分类名称中的敏感标识"""
              return name.replace(" 有🔞", "").replace("有🔞", "").strip()

          def is_nsfw(text):
              """检测是否包含成人/敏感词汇"""
              text_lower = text.lower()
              return any(keyword in text_lower for keyword in NSFW_KEYWORDS)

          def parse_m3u(content, main_group):
              """解析 M3U 格式文件"""
              channels = []
              lines = content.splitlines()
              current_inf = None
              for line in lines:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("#EXTM3U"):
                      continue
                  if line.startswith("#EXTINF"):
                      current_inf = line
                  elif line.startswith("#"):
                      continue
                  else:
                      if current_inf:
                          # 提取源自带的小分类 (group-title)
                          sub_group = ""
                          group_match = re.search(r'group-title="([^"]+)"', current_inf)
                          if group_match:
                              sub_group = group_match.group(1).strip()
                          
                          # 提取频道名称
                          name = "未知频道"
                          comma_idx = current_inf.rfind(',')
                          if comma_idx != -1:
                              name = current_inf[comma_idx+1:].strip()
                          
                          # 过滤敏感内容
                          if is_nsfw(name) or is_nsfw(sub_group):
                              current_inf = None
                              continue
                          
                          clean_main = clean_group_name(main_group)
                          if USE_3_LEVEL_DIRECTORY and sub_group:
                              group_title = f"{clean_main} - {sub_group}"
                          else:
                              group_title = clean_main
                          
                          channels.append({
                              "name": name,
                              "url": line,
                              "group_title": group_title
                          })
                          current_inf = None
              return channels

          def parse_txt(content, main_group):
              """解析 TVBox / DIYP / TXT 格式文件"""
              channels = []
              current_genre = ""
              lines = content.splitlines()
              for line in lines:
                  line = line.strip()
                  if not line:
                      continue
                  # 判断是否为 TXT 的分类行 (如: 央视频道,#genre#)
                  if "#genre#" in line:
                      current_genre = line.split(",")[0].strip()
                      continue
                  # 分割频道名与链接 (兼容逗号、#、$)
                  parts = re.split(r'[,#$]', line, 1)
                  if len(parts) == 2:
                      name, url = parts[0].strip(), parts[1].strip()
                      if url.startswith(("http://", "https://", "rtmp://", "rtsp://", "p2p://", "mitv://")):
                          # 过滤敏感内容
                          if is_nsfw(name) or is_nsfw(current_genre):
                              continue
                          
                          clean_main = clean_group_name(main_group)
                          if USE_3_LEVEL_DIRECTORY and current_genre:
                              group_title = f"{clean_main} - {current_genre}"
                          else:
                              group_title = clean_main
                          
                          channels.append({
                              "name": name,
                              "url": url,
                              "group_title": group_title
                          })
              return channels

          def parse_source(content, main_group):
              """自动识别格式并调用对应解析器"""
              if "#EXTM3U" in content or "#EXTINF" in content:
                  return parse_m3u(content, main_group)
              else:
                  return parse_txt(content, main_group)

          def main():
              all_channels = []

              # ================== 1. 处理主 lives.txt 中的频道 ==================
              lives_url = "https://raw.githubusercontent.com/hegio/FG/main/Lv/lives.txt"
              print("正在下载 lives.txt 主索引...")
              lives_content = fetch_content(lives_url)
              if lives_content:
                  sources = {}
                  for line in lives_content.splitlines():
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue
                      parts = line.split(",", 1)
                      if len(parts) == 2:
                          name, url = parts[0].strip(), parts[1].strip()
                          sources[name] = url

                  matched_sources = {}
                  for target in target_names:
                      if target in sources:
                          matched_sources[target] = sources[target]
                      else:
                          for s_name, s_url in sources.items():
                              if target in s_name or s_name in target:
                                  matched_sources[target] = s_url
                                  break

                  for target in target_names:
                      if target not in matched_sources:
                          print(f"未在 lives.txt 中找到匹配的分类: '{target}'，跳过。")
                          continue
                      url = matched_sources[target]
                      print(f"正在处理分类: '{target}' -> 链接: {url}")
                      source_content = fetch_content(url)
                      if source_content:
                          channels = parse_source(source_content, target)
                          all_channels.extend(channels)
                          print(f"  成功提取了 {len(channels)} 个频道")
              else:
                  print("无法加载 lives.txt，跳过主源处理。")

              # ================== 2. 动态读取本地 extra_sources.txt 中的额外单源 ==================
              extra_filename = "extra_sources.txt"
              if os.path.exists(extra_filename):
                  print(f"检测到本地配置文件 {extra_filename}，开始读取...")
                  try:
                      with open(extra_filename, "r", encoding="utf-8") as f:
                          for line in f:
                              line = line.strip()
                              # 跳过空行及注释
                              if not line or line.startswith("#"):
                                  continue
                              parts = line.split(",", 1)
                              if len(parts) == 2:
                                  ext_name, ext_url = parts[0].strip(), parts[1].strip()
                                  print(f"正在抓取额外单源: '{ext_name}' -> 链接: {ext_url}")
                                  source_content = fetch_content(ext_url)
                                  if source_content:
                                      channels = parse_source(source_content, ext_name)
                                      all_channels.extend(channels)
                                      print(f"  额外单源 '{ext_name}' 提取成功，共 {len(channels)} 个频道")
                                  else:
                                      print(f"  抓取额外单源链接失败: {ext_url}")
                  except Exception as e:
                      print(f"读取本地 {extra_filename} 发生错误: {e}")
              else:
                  print(f"未检测到本地额外源配置文件 {extra_filename}，不处理额外单源。")

              # ================== 3. 去重与输出 ==================
              seen = set()
              unique_channels = []
              for ch in all_channels:
                  key = (ch['group_title'], ch['name'], ch['url'])
                  if key not in seen:
                      seen.add(key)
                      unique_channels.append(ch)

              output_filename = "鱼豚无18a.m3u"
              print(f"正在写入 {output_filename}...")
              try:
                  with open(output_filename, "w", encoding="utf-8") as f:
                      f.write("#EXTM3U\n")
                      for ch in unique_channels:
                          f.write(f'#EXTINF:-1 group-title="{ch["group_title"]}",{ch["name"]}\n')
                          f.write(f'{ch["url"]}\n')
                  print("M3U 播放列表更新成功！")
              except Exception as e:
                  print(f"写入文件失败: {e}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Execute script
        run: python generate_m3u.py

      - name: Clean build files
        run: rm -f generate_m3u.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 鱼豚无18a.m3u
          git diff-index --quiet HEAD || git commit -m "Auto Update: 鱼豚无18a.m3u (每18小时自动更新)"
          git push
