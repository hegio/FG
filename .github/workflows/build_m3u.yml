name: 自动读取并生成 M3U 播放列表

on:
  schedule:
    - cron: '0 */18 * * *'  # 每 18 小时自动运行一次
  workflow_dispatch:        # 支持手动立即触发运行

# 赋予工作流向仓库写入和提交代码的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 生成 M3U 转换脚本并运行
        run: |
          cat << 'EOF' > parse_to_m3u.py
          import urllib.request
          import urllib.parse
          import re
          import os

          def fetch_content(url):
              """获取远程 txt 链接内容，兼容 utf-8 和 gbk 编码"""
              try:
                  req = urllib.request.Request(
                      url, 
                      headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'}
                  )
                  with urllib.request.urlopen(req, timeout=20) as response:
                      raw_data = response.read()
                      try:
                          return raw_data.decode('utf-8')
                      except UnicodeDecodeError:
                          return raw_data.decode('gbk', errors='ignore')
              except Exception as e:
                  print(f"读取链接失败 {url}: {e}")
                  return ""

          def parse_txt_to_m3u(txt_content, default_group="其他"):
              """解析 TVBox TXT 格式内容为 M3U 结构"""
              lines = txt_content.split('\n')
              m3u_entries = []
              current_group = default_group
              
              for line in lines:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  # 1. 判断是否是分类行（如: "央视频道,#genre#"）
                  if '#genre#' in line:
                      group_name = line.replace('#genre#', '').replace(',', '').strip()
                      if group_name:
                          current_group = group_name
                      continue
                  
                  # 2. 判断是否是频道数据行（如: "CCTV-1,http://..." 或多源 "CCTV-1,url1#url2"）
                  if ',' in line:
                      parts = line.split(',', 1)
                      name = parts[0].strip()
                      url_part = parts[1].strip()
                      
                      if not url_part:
                          continue
                      
                      # 处理多源数据
                      urls = url_part.split('#')
                      for u in urls:
                          u = u.strip()
                          # 仅保留符合直播流格式的链接
                          if u.startswith(('http://', 'https://', 'rtmp://', 'rtsp://', 'p2p://', 'mitv://')):
                              m3u_entries.append({
                                  'name': name,
                                  'url': u,
                                  'group': current_group
                              })
              return m3u_entries

          def main():
              lives_file_path = "Lv/lives.txt"
              if not os.path.exists(lives_file_path):
                  print(f"未找到本地文件: {lives_file_path}")
                  return
              
              # 读取本地的 lives.txt
              with open(lives_file_path, 'r', encoding='utf-8-sig', errors='ignore') as f:
                  lines = f.readlines()
              
              target_urls = []
              for line in lines:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  # 提取每一行中符合 http/https 且包含 .txt 的链接
                  matches = re.findall(r'(https?://[^\s,#]+)', line)
                  for url in matches:
                      parsed_url = urllib.parse.urlparse(url)
                      # 只要路径是以 .txt 结尾，或者包含 .txt
                      if parsed_url.path.endswith('.txt') or '.txt' in parsed_url.path:
                          target_urls.append(url)
              
              print(f"共提取到 {len(target_urls)} 个待处理的 .txt 直播源链接。")
              
              all_entries = []
              for url in target_urls:
                  print(f"正在读取并解析: {url}")
                  content = fetch_content(url)
                  if content:
                      # 提取文件名（去除后缀）作为默认类目名称
                      filename = url.split('/')[-1].replace('.txt', '')
                      filename = urllib.parse.unquote(filename)
                      
                      entries = parse_txt_to_m3u(content, default_group=filename)
                      all_entries.extend(entries)
                      print(f"成功解析出 {len(entries)} 条频道。")
              
              # 写入生成标准 M3U 文件
              output_filename = "鱼豚无18a.m3u"
              m3u_lines = ["#EXTM3U"]
              
              for entry in all_entries:
                  name = entry['name']
                  group = entry['group']
                  url = entry['url']
                  # 写入 M3U 标准格式
                  m3u_lines.append(f'#EXTINF:-1 tvg-name="{name}" group-title="{group}",{name}')
                  m3u_lines.append(url)
              
              with open(output_filename, 'w', encoding='utf-8') as f:
                  f.write('\n'.join(m3u_lines))
              
              print(f"转换完成，共生成 {len(all_entries)} 条频道数据，已写入到 {output_filename}。")

          if __name__ == "__main__":
              main()
          EOF
          python parse_to_m3u.py

      - name: 提交并推送生成的 M3U 文件
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 鱼豚无18a.m3u
          
          # 检查文件是否有实际修改，有修改才进行提交，避免因没有变动导致工作流报错
          if git diff --staged --quiet; then
            echo "文件无变化，无需更新。"
          else
            git commit -m "自动更新: 鱼豚无18a.m3u"
            git push
          fi
