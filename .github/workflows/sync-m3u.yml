name: Sync Upstream Files

on:
  schedule:
    - cron: '0 */6 * * *'  # 每24小时同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Download all upstream files
      run: |
        # 定义所有需要同步的文件
        files=(
          "zilongTV:https://raw.githubusercontent.com/zilong7728/Collect-IPTV/refs/heads/main/best_sorted.m3u8"
          "海豚无18加555:https://github.com/FGBLH/GHK/blob/main/%E6%B5%B7%E8%B1%9A%E6%97%A018%E5%8A%A0555.json"
          "海豚666:https://github.com/FGBLH/GHK/blob/main/%E6%B5%B7%E8%B1%9A666.json"
        )
        
        for item in "${files[@]}"; do
          name="${item%%:*}"
          url="${item##*:}"
          
          echo "Downloading $name from $url"
          
          if curl -L --fail --max-time 30 -o "$name.tmp" "https://ghfast.top/$url"; then
            echo "✓ Downloaded $name via ghfast.top"
          elif curl -L --fail --max-time 30 -o "$name.tmp" "$url"; then
            echo "✓ Downloaded $name via direct"
          else
            echo "::warning::Failed to download $name, skipping"
            continue
          fi
          
          if [ -s "$name.tmp" ]; then
            mv "$name.tmp" "$name"
            echo "✓ Saved $name ($(wc -l < $name 2>/dev/null || echo '?') lines)"
          else
            echo "::warning::$name is empty, removed"
            rm -f "$name.tmp"
          fi
        done

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Add external live sources to 海豚影视
      run: |
        cat > add_sources.py << 'EOF'
        import json
        import sys

        def add_live_sources():
            try:
                with open('海豚影视', 'r', encoding='utf-8') as f:
                    data = json.load(f)
            except Exception as e:
                print(f"Error reading 海豚影视: {e}")
                return False

            new_sources = [
                {
                    "name": "🐬海角黄色",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/FGBLH/fgrjk2/main/haijiao669"
                },
                {
                    "name": "🐬zilong大陆TV",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/zilong7728/Collect-IPTV/main/best_sorted.m3u8"
                }
            ]

            existing_names = {item.get('name', '') for item in data.get('lives', [])}
            
            added_count = 0
            for source in new_sources:
                if source['name'] not in existing_names:
                    data['lives'].append(source)
                    print(f"✓ Added: {source['name']}")
                    added_count += 1
                else:
                    print(f"⚠️  Already exists: {source['name']}")

            if added_count > 0:
                with open('海豚影视', 'w', encoding='utf-8') as f:
                    json.dump(data, f, ensure_ascii=False, indent=4)
                print(f"✓ Total {added_count} new sources added to 海豚影视")
                return True
            else:
                print("No new sources to add")
                return False

        if __name__ == "__main__":
            success = add_live_sources()
            sys.exit(0 if success else 0)
        EOF
        
        python3 add_sources.py

    - name: Generate comprehensive FgPlayList.m3u
      run: |
        cat > generate_FgPlayList.py << 'EOF'
        import base64
        import json
        import re
        import urllib.parse
        import os

        def parse_m3u_to_channels(filename, prefix=""):
            """解析 M3U 文件提取频道"""
            if not os.path.exists(filename):
                return []
            
            channels = []
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    lines = f.readlines()
                
                for i, line in enumerate(lines):
                    line = line.strip()
                    if line.startswith('#EXTINF:-1'):
                        # 提取频道名
                        name_match = re.search(r',(.*)$', line)
                        if name_match:
                            name = name_match.group(1)
                            # 查找下一行 URL
                            next_line_index = i + 1
                            while next_line_index < len(lines):
                                next_line = lines[next_line_index].strip()
                                if next_line and not next_line.startswith('#'):
                                    if next_line.startswith(('http', 'rtmp', 'rtsp', 'p2p')):
                                        final_name = f"{prefix} {name}" if prefix else name
                                        channels.append((final_name, next_line))
                                    break
                                next_line_index += 1
            except Exception as e:
                print(f"Error parsing {filename}: {e}")
            
            return channels

        def parse_vmess_link(link):
            """解析 vmess 链接"""
            try:
                b64_data = link[8:]
                b64_data += '=' * (4 - len(b64_data) % 4)
                json_str = base64.b64decode(b64_data).decode('utf-8')
                data = json.loads(json_str)
                server = data.get('add', '')
                port = data.get('port', 443)
                ps = data.get('ps', 'VMess')
                return f"{ps} | {server}:{port}"
            except:
                return None

        def parse_subscription_file(filename):
            """解析订阅文件（Base64 或明文）"""
            if not os.path.exists(filename):
                return []
            
            with open(filename, 'r', encoding='utf-8') as f:
                content = f.read().strip()
            
            # 尝试 Base64 解码
            try:
                padding = 4 - len(content) % 4
                if padding != 4:
                    content += '=' * padding
                decoded = base64.b64decode(content).decode('utf-8')
                lines = [l.strip() for l in decoded.split('\n') if l.strip()]
            except:
                lines = [l.strip() for l in content.split('\n') if l.strip()]
            
            channels = []
            for line in lines:
                if line.startswith('vmess://'):
                    name = parse_vmess_link(line)
                    if name:
                        channels.append((name, line))
                elif line.startswith(('vless://', 'trojan://', 'ss://')):
                    # 简化处理，提取域名
                    try:
                        if line.startswith('vless://'):
                            server = line.split('@')[1].split(':')[0]
                            name = f"VLESS | {server}"
                        elif line.startswith('trojan://'):
                            server = line.split('@')[1].split(':')[0]
                            name = f"Trojan | {server}"
                        elif line.startswith('ss://'):
                            name = f"Shadowsocks | {line.split('@')[1].split(':')[0]}"
                        channels.append((name, line))
                    except:
                        continue
            
            return channels

        def extract_lives_from_json(filename):
            """从 JSON 配置中提取 lives 列表"""
            if not os.path.exists(filename):
                return []
            
            try:
                with open(filename, 'r', encoding='utf-8') as f:
                    data = json.load(f)
                
                channels = []
                for live in data.get('lives', []):
                    url = live.get('url', '')
                    name = live.get('name', '')
                    if url and name:
                        channels.append((name, url))
                
                return channels
            except Exception as e:
                print(f"Error extracting lives from {filename}: {e}")
                return []

        # 收集所有频道
        all_channels = []

        # 从 M3U 文件解析
        m3u_files = [
            ("zilongTV", "🐬"),
            ("海豚无18加555", "🐬"),
        ]
        
        for file_name, prefix in m3u_files:
            if os.path.exists(file_name):
                channels = parse_m3u_to_channels(file_name, prefix)
                all_channels.extend(channels)
                print(f"Parsed {len(channels)} channels from {file_name}")

        # 从 JSON 配置提取直播源
        json_files = ["海豚无18加555", "海豚666"]
        for file_name in json_files:
            if os.path.exists(file_name):
                channels = extract_lives_from_json(file_name)
                all_channels.extend(channels)
                print(f"Extracted {len(channels)} live sources from {file_name}")

        # 生成标准 M3U 文件
        with open('FgPlayList.m3u', 'w', encoding='utf-8') as f:
            f.write('#EXTM3U\n')
            f.write('#EXTINF:-1 tvg-name="🐬海豚影视综合",🐬海豚影视综合\n')
            f.write('http://localhost/placeholder\n')
            
            # 写入所有频道
            for name, url in all_channels:
                # 清理名称中的特殊字符
                clean_name = re.sub(r'[|\\/*?:<>"]', '', name)
                f.write(f'#EXTINF:-1 tvg-name="{clean_name}",{clean_name}\n')
                f.write(f'{url}\n')

        print(f"✓ Generated FgPlayList.m3u with {len(all_channels)} channels")
        EOF
        
        python3 generate_FgPlayList.py

    - name: Convert specific FgPlayList files to M3U
      run: |
        cat > convert.py << 'EOF'
        import os
        import re

        def convert_to_m3u(input_file, output_file):
            """将简易格式转换为标准M3U格式"""
            if not os.path.exists(input_file):
                print(f"⚠️  {input_file} not found, skipping")
                return False
            
            try:
                with open(input_file, 'r', encoding='utf-8') as f:
                    lines = f.readlines()
            except UnicodeDecodeError:
                with open(input_file, 'r', encoding='gbk') as f:
                    lines = f.readlines()
            
            output = ['#EXTM3U x-tvg-url=""']
            current_group = '未分类'
            count = 0
            
            for line in lines:
                line = line.strip()
                if not line:
                    continue
                
                # 检测分组标记 (,#genre#)
                if ',#genre#' in line:
                    current_group = line.replace(',#genre#', '').strip()
                    continue
                
                # 处理 "名称,URL" 格式
                for protocol in [',http://', ',https://', ',p2p://', ',rtmp://', ',rtsp://']:
                    if protocol in line:
                        idx = line.find(protocol)
                        name = line[:idx].strip()
                        url = line[idx+1:].strip()
                        
                        # 清理名称中的多余空格
                        name = re.sub(r'\s+', ' ', name)
                        
                        output.append(f'#EXTINF:-1 group-title="{current_group}",{name}')
                        output.append(url)
                        count += 1
                        break
            
            with open(output_file, 'w', encoding='utf-8') as f:
                f.write('\n'.join(output))
            
            print(f"✓ Converted {input_file} -> {output_file} ({count} channels)")
            return True

        # 转换特定文件
        convert_to_m3u("zilongTV", "zilongTV.m3u")
        convert_to_m3u("海豚无18加555", "haitun.m3u")
        
        print("✓ 海豚影视, 海豚666 保持原样（TVBox配置）")
        EOF
        
        python3 convert.py

    - name: Commit and push changes
      run: |
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Sync: Update files and generate FgPlayList.m3u [$(date '+%Y-%m-%d %H:%M')]
          
          - 同步所有有效文件
          - 生成综合 FgPlayList.m3u
          - 保留YouTube链接"
          git push
          echo "✅ Successfully synced all files"
        fi
