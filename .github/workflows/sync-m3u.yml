name: Sync Upstream Files

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Download all upstream files
      run: |
        set -uo pipefail
        files=(
          "zilongTV:https://raw.githubusercontent.com/zilong7728/Collect-IPTV/refs/heads/main/best_sorted.m3u8"
          "ok海豚无18加:https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A%E6%97%A018%E5%8A%A0.json"
          "ok海豚:https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/ok%E6%B5%B7%E8%B1%9A.json"
          "鱼壳海豚:https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/Web%E9%B1%BC%E5%A3%B3%E6%B5%B7%E8%B1%9A.json"
          "鱼壳海豚无18加:https://raw.githubusercontent.com/FGBLH/HKL/refs/heads/main/Web%E9%B1%BC%E5%A3%B3%E6%B5%B7%E8%B1%9A%E6%97%A018%E5%8A%A0.json"
        )

        for item in "${files[@]}"; do
          name="${item%%:*}"
          url="${item##*:}"

          echo "👉 Downloading $name ..."

          if curl -L --fail --max-time 30 -o "$name.tmp" "$url"; then
            echo "✅ $name 下载成功（direct）"
          elif curl -L --fail --max-time 30 -o "$name.tmp" "https://ghfast.top/$url"; then
            echo "✅ $name 下载成功（ghfast）"
          else
            echo "::warning::Failed to download $name – skipping"
            rm -f "$name.tmp"
            continue
          fi

          if [ -s "$name.tmp" ]; then
            mv "$name.tmp" "$name"
            echo "📦 $name 已保存 ($(wc -l < $name 2>/dev/null || echo '?') 行)"
          else
            echo "::warning::$name 内容为空，已删除"
            rm -f "$name.tmp"
          fi
        done

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Read extra_sources.txt and parse extra sources
      run: |
        cat > read_extra.py << 'PYEOF'
        import json
        import os

        def parse_extra_sources():
            """读取并解析 extra_sources.txt"""
            extra_sources = []

            if not os.path.isfile('extra_sources.txt'):
                print("[INFO] extra_sources.txt 不存在，跳过")
                return extra_sources

            print("[INFO] 正在读取 extra_sources.txt...")

            with open('extra_sources.txt', 'r', encoding='utf-8') as f:
                lines = f.readlines()

            for line in lines:
                line = line.strip()

                # 跳过空行和注释
                if not line or line.startswith('#'):
                    continue

                # 解析 "名称,URL" 格式
                if ',' in line:
                    parts = line.split(',', 1)
                    if len(parts) == 2:
                        name = parts[0].strip()
                        url = parts[1].strip()

                        if name and url:
                            extra_sources.append({
                                "name": name,
                                "type": 0,
                                "ua": "okhttp",
                                "url": url
                            })
                            print(f"[INFO] 解析额外源: {name}")

            print(f"[DONE] 共解析到 {len(extra_sources)} 条额外源")
            return extra_sources

        # 保存为临时文件供后续步骤使用
        extra_sources = parse_extra_sources()

        # 保存到文件（用于其他步骤读取）
        with open('_extra_sources_list.json', 'w', encoding='utf-8') as f:
            json.dump(extra_sources, f, ensure_ascii=False, indent=4)

        print(f"[INFO] 已保存额外源到 _extra_sources_list.json")
        PYEOF
        python3 read_extra.py

    - name: Add external live sources to 海豚影视
      run: |
        cat > add_sources.py << 'PYEOF'
        import json
        import sys
        import os

        def add_live_sources():
            src_file = '海豚影视'
            if not os.path.isfile(src_file):
                print(f"[WARN] {src_file} 不存在，跳过添加直播源")
                return False

            try:
                with open(src_file, 'r', encoding='utf-8') as f:
                    data = json.load(f)
            except Exception as e:
                print(f"[ERROR] 读取 {src_file} 失败: {e}")
                return False

            new_sources = [
                {
                    "name": "🐬海角黄色",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/FGBLH/fgrjk2/main/haijiao669"
                },
                {
                    "name": "🐬zilong大陆TV",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/zilong7728/Collect-IPTV/main/best_sorted.m3u8"
                }
            ]

            # 读取额外源
            if os.path.isfile('_extra_sources_list.json'):
                with open('_extra_sources_list.json', 'r', encoding='utf-8') as f:
                    extra = json.load(f)
                    new_sources.extend(extra)
                    print(f"[INFO] 整合了 {len(extra)} 条额外源到 海豚影视")

            existed = {i.get('name', '') for i in data.get('lives', [])}
            added = 0
            for src in new_sources:
                if src['name'] not in existed:
                    data.setdefault('lives', []).append(src)
                    print(f"[INFO] Added {src['name']}")
                    added += 1
                else:
                    print(f"[WARN] 已存在 {src['name']}")

            if added:
                with open(src_file, 'w', encoding='utf-8') as f:
                    json.dump(data, f, ensure_ascii=False, indent=4)
                print(f"[INFO] 共新增 {added} 条直播源")
                return True
            return False

        if __name__ == '__main__':
            sys.exit(0 if add_live_sources() else 0)
        PYEOF
        python3 add_sources.py

    # ── 6️⃣ 生成 鱼壳海豚_local.json（本地 spider.jar 挂载） ──
    - name: Generate 鱼壳海豚_local.json
      run: |
        cat > generate_local.py << 'PYEOF'
        import json
        import os

        src = "鱼壳海豚"
        dst = "鱼壳海豚_local.json"

        if not os.path.isfile(src):
            print(f"[WARN] {src} 不存在，跳过生成 local 版本")
            exit(0)

        with open(src, 'r', encoding='utf-8') as f:
            data = json.load(f)

        # Termux HTTP 服务器地址
        data["spider"] = "http://192.168.123.90:8080/spider.jar"
        data["wallpaper"] = "http://tool.teyonds.com/api"
        data["logo"] = "https://img.freepik.com/free-vector/cute-dolphin-swimming-cartoon-vector-icon-illustration-animal-nature-icon-isolated-flat-vector_138676-12582.jpg?semt=ais_hybrid&w=740&q=80"

        # 添加额外源
        if os.path.isfile('_extra_sources_list.json'):
            with open('_extra_sources_list.json', 'r', encoding='utf-8') as f:
                extra = json.load(f)
                data.setdefault('lives', []).extend(extra)
                print(f"[INFO] 已整合 {len(extra)} 条额外源到 local 版本")

        with open(dst, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=4)

        print(f"[DONE] 已生成 {dst}")
        print(f"[INFO] spider 路径: http://192.168.123.90:8080/spider.jar")
        print(f"[INFO] 请确保 Termux 中已运行: cd ~ && python -m http.server 8080")
        PYEOF
        python3 generate_local.py

    # ── 7️⃣ 生成 鱼壳海豚_gb.json（GitHub spider.jar 挂载） ──
    - name: Generate 鱼壳海豚_gb.json
      run: |
        cat > generate_gb.py << 'PYEOF'
        import json
        import os

        src = "鱼壳海豚"
        dst = "鱼壳海豚_gb.json"

        if not os.path.isfile(src):
            print(f"[WARN] {src} 不存在，跳过生成 GB 版本")
            exit(0)

        with open(src, 'r', encoding='utf-8') as f:
            data = json.load(f)

        data["spider"] = "https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar"
        data["wallpaper"] = "http://tool.teyonds.com/api"
        data["logo"] = "https://img.freepik.com/free-vector/cute-dolphin-swimming-cartoon-vector-icon-illustration-animal-nature-icon-isolated-flat-vector_138676-12582.jpg?semt=ais_hybrid&w=740&q=80"

        # 添加额外源
        if os.path.isfile('_extra_sources_list.json'):
            with open('_extra_sources_list.json', 'r', encoding='utf-8') as f:
                extra = json.load(f)
                data.setdefault('lives', []).extend(extra)
                print(f"[INFO] 已整合 {len(extra)} 条额外源到 GB 版本")

        with open(dst, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=4)

        print(f"[DONE] 已生成 {dst}（GitHub 挂载）")
        print(f"[INFO] spider URL: https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar")
        PYEOF
        python3 generate_gb.py

    # ── 9️⃣ 生成 ok海豚_gb.json（GitHub spider.jar 挂载） ──
    - name: Generate ok海豚_gb.json
      run: |
        cat > generate_ok_gb.py << 'PYEOF'
        import json
        import os

        src = "ok海豚"
        dst = "ok海豚_gb.json"

        if not os.path.isfile(src):
            print(f"[WARN] {src} 不存在，跳过生成 GB 版本")
            exit(0)

        with open(src, 'r', encoding='utf-8') as f:
            data = json.load(f)

        data["spider"] = "https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar"
        data["wallpaper"] = "http://tool.teyonds.com/api"
        data["logo"] = "https://img.freepik.com/free-vector/cute-dolphin-swimming-cartoon-vector-icon-illustration-animal-nature-icon-isolated-flat-vector_138676-12582.jpg?semt=ais_hybrid&w=740&q=80"

        # 添加额外源
        if os.path.isfile('_extra_sources_list.json'):
            with open('_extra_sources_list.json', 'r', encoding='utf-8') as f:
                extra = json.load(f)
                data.setdefault('lives', []).extend(extra)
                print(f"[INFO] 已整合 {len(extra)} 条额外源到 ok海豚_gb 版本")

        with open(dst, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=4)

        print(f"[DONE] 已生成 {dst}（GitHub 挂载）")
        print(f"[INFO] spider URL: https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar")
        PYEOF
        python3 generate_ok_gb.py

    # ── 11️⃣ 生成 ok海豚无18加_gb.json（GitHub spider.jar 挂载） ──
    - name: Generate ok海豚无18加_gb.json
      run: |
        cat > generate_ok18_gb.py << 'PYEOF'
        import json
        import os

        src = "ok海豚无18加"
        dst = "ok海豚无18加_gb.json"

        if not os.path.isfile(src):
            print(f"[WARN] {src} 不存在，跳过生成 GB 版本")
            exit(0)

        with open(src, 'r', encoding='utf-8') as f:
            data = json.load(f)

        data["spider"] = "https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar"
        data["wallpaper"] = "http://tool.teyonds.com/api"
        data["logo"] = "https://img.freepik.com/free-vector/cute-dolphin-swimming-cartoon-vector-icon-illustration-animal-nature-icon-isolated-flat-vector_138676-12582.jpg?semt=ais_hybrid&w=740&q=80"

        # 添加额外源
        if os.path.isfile('_extra_sources_list.json'):
            with open('_extra_sources_list.json', 'r', encoding='utf-8') as f:
                extra = json.load(f)
                data.setdefault('lives', []).extend(extra)
                print(f"[INFO] 已整合 {len(extra)} 条额外源到 ok海豚无18加_gb 版本")

        with open(dst, 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=4)

        print(f"[DONE] 已生成 {dst}（GitHub 挂载）")
        print(f"[INFO] spider URL: https://ghfast.top/https://raw.githubusercontent.com/hegio/FG/main/spider.jar")
        PYEOF
        python3 generate_ok18_gb.py

    # ── 12️⃣ 清理临时文件
    - name: Cleanup temporary files
      run: |
        rm -f _extra_sources_list.json
        rm -f read_extra.py add_sources.py generate_local.py generate_gb.py generate_ok_local.py generate_ok_gb.py generate_ok18_local.py generate_ok18_gb.py
        echo "[INFO] 已清理临时文件"

    - name: Commit and push changes
      run: |
        git add -A
        if git diff --staged --quiet; then
          echo "✅ 没有需要提交的改动"
        else
          git commit -m "🔄 Sync: Update all configs with extra sources [$(date '+%Y-%m-%d %H:%M')]
          - 同步所有上游文件
          - 整合 extra_sources.txt 的额外源
          - 生成 鱼壳海豚_local.json（本地 spider.jar）
          - 生成 鱼壳海豚_gb.json（GitHub spider.jar）
          - 生成 ok海豚_gb.json（GitHub spider.jar）
          - 生成 ok海豚无18加_gb.json（GitHub spider.jar）"
          git push
          echo "🚀 提交已完成"
        fi
