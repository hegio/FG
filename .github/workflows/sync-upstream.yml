name: Sync Upstream Files

on:
  schedule:
    - cron: '0 */24 * * *'  # 每24小时同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Download all upstream files
      run: |
        # 定义四个需要同步的文件
        files=(
          "港台大陆:https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/港台大陆"
          "安博:https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/安博"
          "海马影视:https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/海马影视"
          "锋哥影视json:https://raw.githubusercontent.com/FGBLH/fgrjk/refs/heads/main/锋哥影视json"
        )
        
        for item in "${files[@]}"; do
          name="${item%%:*}"
          url="${item##*:}"
          
          echo "Downloading $name from $url"
          
          # 尝试 ghfast.top 代理
          if curl -L --fail --max-time 30 -o "$name.tmp" "https://ghfast.top/$url"; then
            echo "✓ Downloaded $name via ghfast.top"
          # 失败则尝试直连
          elif curl -L --fail --max-time 30 -o "$name.tmp" "$url"; then
            echo "✓ Downloaded $name via direct"
          else
            echo "::warning::Failed to download $name, skipping"
            continue
          fi
          
          # 检查文件是否有效
          if [ -s "$name.tmp" ]; then
            mv "$name.tmp" "$name"
            echo "✓ Saved $name ($(wc -l < $name) lines)"
          else
            echo "::warning::$name is empty, removed"
            rm -f "$name.tmp"
          fi
        done

    - name: Convert playlist files to M3U (保留YouTube链接)
      run: |
        cat > convert.py << 'EOF'
        import os
        import re

        def convert_to_m3u(input_file, output_file):
            """将简易格式转换为标准M3U格式（保留YouTube链接）"""
            if not os.path.exists(input_file):
                print(f"⚠️  {input_file} not found, skipping")
                return False
            
            try:
                with open(input_file, 'r', encoding='utf-8') as f:
                    lines = f.readlines()
            except UnicodeDecodeError:
                with open(input_file, 'r', encoding='gbk') as f:
                    lines = f.readlines()
            
            output = ['#EXTM3U x-tvg-url=""']
            current_group = '未分类'
            count = 0
            
            for line in lines:
                line = line.strip()
                if not line:
                    continue
                
                # 检测分组标记 (,#genre#)
                if ',#genre#' in line:
                    current_group = line.replace(',#genre#', '').strip()
                    continue
                
                # 【重要】取消 YouTube 链接过滤，保留所有链接
                # 处理 "名称,URL" 格式
                for protocol in [',http://', ',https://', ',p2p://', ',rtmp://', ',rtsp://']:
                    if protocol in line:
                        idx = line.find(protocol)
                        name = line[:idx].strip()
                        url = line[idx+1:].strip()
                        
                        # 清理名称中的多余空格
                        name = re.sub(r'\s+', ' ', name)
                        
                        output.append(f'#EXTINF:-1 group-title="{current_group}",{name}')
                        output.append(url)
                        count += 1
                        break
            
            with open(output_file, 'w', encoding='utf-8') as f:
                f.write('\n'.join(output))
            
            print(f"✓ Converted {input_file} -> {output_file} ({count} channels, 保留YouTube链接)")
            return True

        # 只转换直播源文件
        convert_to_m3u("港台大陆", "playlist.m3u")
        convert_to_m3u("安博", "anbo.m3u")
        
        # TVBox配置文件保持原样，不转换
        print("✓ 海马影视 和 锋哥影视json 保持原样（TVBox配置）")
        EOF
        
        python3 convert.py

    - name: Commit and push changes
      run: |
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Sync: Update files [$(date '+%Y-%m-%d %H:%M')]
          
          - 同步: 港台大陆, 安博, 海马影视, 锋哥影视json
          - 保留YouTube链接"
          git push
          echo "✅ Successfully synced all files"
        fi
