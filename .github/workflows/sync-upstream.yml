name: Sync Upstream Files

on:
  schedule:
    - cron: '0 */24 * * *'  # 每24小时同步
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Download all upstream files
      run: |
        # 定义四个需要同步的文件（保留原有）
        files=(
          "zilongTV:https://raw.githubusercontent.com/zilong7728/Collect-IPTV/refs/heads/main/best_sorted.m3u8"
          "海豚影视无18加:https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/%E6%B5%B7%E8%B1%9A%E5%BD%B1%E8%A7%86%E6%97%A018%E5%8A%A0"
          "海豚影视:https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/%E6%B5%B7%E8%B1%9A%E5%BD%B1%E8%A7%86"
          "锋哥影视json:https://raw.githubusercontent.com/FGBLH/fgrjk/refs/heads/main/锋哥影视json"
          "haijiao669:https://raw.githubusercontent.com/FGBLH/fgrjk2/refs/heads/main/haijiao669"
        )
        
        for item in "${files[@]}"; do
          name="${item%%:*}"
          url="${item##*:}"
          
          echo "Downloading $name from $url"
          
          # 尝试 ghfast.top 代理
          if curl -L --fail --max-time 30 -o "$name.tmp" "https://ghfast.top/$url"; then
            echo "✓ Downloaded $name via ghfast.top"
          # 失败则尝试直连
          elif curl -L --fail --max-time 30 -o "$name.tmp" "$url"; then
            echo "✓ Downloaded $name via direct"
          else
            echo "::warning::Failed to download $name, skipping"
            continue
          fi
          
          # 检查文件是否有效
          if [ -s "$name.tmp" ]; then
            mv "$name.tmp" "$name"
            echo "✓ Saved $name ($(wc -l < $name 2>/dev/null || echo '?') lines)"
          else
            echo "::warning::$name is empty, removed"
            rm -f "$name.tmp"
          fi
        done

    - name: Add external live sources to 海豚影视
      run: |
        cat > add_sources.py << 'EOF'
        import json
        import sys

        def add_live_sources():
            try:
                with open('海豚影视', 'r', encoding='utf-8') as f:
                    data = json.load(f)
            except Exception as e:
                print(f"Error reading 海豚影视: {e}")
                return False

            # 定义要添加的外部直播源（格式：名称, URL）
            new_sources = [
                {
                    "name": "🐬海角黄色",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/FGBLH/fgrjk2/main/haijiao669"
                },
                {
                    "name": "🐬zilong大陆TV",
                    "type": 0,
                    "ua": "okhttp",
                    "url": "https://ghfast.top/https://raw.githubusercontent.com/zilong7728/Collect-IPTV/main/best_sorted.m3u8"
                }
            ]

            # 获取现有名称列表，避免重复添加
            existing_names = {item.get('name', '') for item in data.get('lives', [])}
            
            added_count = 0
            for source in new_sources:
                if source['name'] not in existing_names:
                    data['lives'].append(source)
                    print(f"✓ Added: {source['name']}")
                    added_count += 1
                else:
                    print(f"⚠️  Already exists: {source['name']}")

            if added_count > 0:
                # 保存回文件（保持格式美观）
                with open('海豚影视', 'w', encoding='utf-8') as f:
                    json.dump(data, f, ensure_ascii=False, indent=4)
                print(f"✓ Total {added_count} new sources added to 海豚影视")
                return True
            else:
                print("No new sources to add")
                return False

        if __name__ == "__main__":
            success = add_live_sources()
            sys.exit(0 if success else 0)  # 即使没新增也不报错
        EOF
        
        python3 add_sources.py

    - name: Convert playlist files to M3U (保留YouTube链接)
      run: |
        cat > convert.py << 'EOF'
        import os
        import re

        def convert_to_m3u(input_file, output_file):
            """将简易格式转换为标准M3U格式（保留YouTube链接）"""
            if not os.path.exists(input_file):
                print(f"⚠️  {input_file} not found, skipping")
                return False
            
            try:
                with open(input_file, 'r', encoding='utf-8') as f:
                    lines = f.readlines()
            except UnicodeDecodeError:
                with open(input_file, 'r', encoding='gbk') as f:
                    lines = f.readlines()
            
            output = ['#EXTM3U x-tvg-url=""']
            current_group = '未分类'
            count = 0
            
            for line in lines:
                line = line.strip()
                if not line:
                    continue
                
                # 检测分组标记 (,#genre#)
                if ',#genre#' in line:
                    current_group = line.replace(',#genre#', '').strip()
                    continue
                
                # 【重要】取消 YouTube 链接过滤，保留所有链接
                # 处理 "名称,URL" 格式
                for protocol in [',http://', ',https://', ',p2p://', ',rtmp://', ',rtsp://']:
                    if protocol in line:
                        idx = line.find(protocol)
                        name = line[:idx].strip()
                        url = line[idx+1:].strip()
                        
                        # 清理名称中的多余空格
                        name = re.sub(r'\s+', ' ', name)
                        
                        output.append(f'#EXTINF:-1 group-title="{current_group}",{name}')
                        output.append(url)
                        count += 1
                        break
            
            with open(output_file, 'w', encoding='utf-8') as f:
                f.write('\n'.join(output))
            
            print(f"✓ Converted {input_file} -> {output_file} ({count} channels, 保留YouTube链接)")
            return True

        # 只转换直播源文件
        convert_to_m3u("zilongTV", "zilongTV.m3u")
        convert_to_m3u("海豚影视无18加", "haitun.m3u")
        
        # TVBox配置文件保持原样，不转换
        print("✓ 海豚影视 和 锋哥影视json 保持原样（TVBox配置）")
        EOF
        
        python3 convert.py

    - name: Commit and push changes
      run: |
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Sync: Update files with new live sources [$(date '+%Y-%m-%d %H:%M')]
          
          - 同步: zilongTV, 海豚影视无18加, 海豚影视, 锋哥影视json, haijiao669
          - 新增直播源到海豚影视: 海角黄色, zilong大陆TV
          - 保留YouTube链接"
          git push
          echo "✅ Successfully synced all files"
        fi
