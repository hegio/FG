name: Take Lives URLs

on:
  push:
    paths:
      - '鱼壳海豚无18加'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-lives:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract lives URLs
        run: |
          SOURCE_FILE="鱼壳海豚无18加"
          OUTPUT_FILE="Lv/lives.txt"
          
          # Ensure output directory exists
          mkdir -p Lv
          
          # Extract URLs from lives array using Python
          python3 << 'EOF'
          import json
          import re
          
          with open("${{ env.SOURCE_FILE }}", "r", encoding="utf-8") as f:
              content = f.read()
          
          # Find the lives array
          lives_match = re.search(r'"lives"\s*:\s*(\[.*?\])(?=\s*,\s*"parses")', content, re.DOTALL)
          if not lives_match:
              # Fallback: try to find lives array with a simpler pattern
              lives_match = re.search(r'"lives"\s*:\s*(\[.*?\])', content, re.DOTALL)
          
          if lives_match:
              lives_json = lives_match.group(1)
              # Fix any trailing commas before parsing
              lives_json = re.sub(r',\s*]', ']', lives_json)
              lives = json.loads(lives_json)
              
              urls = []
              for item in lives:
                  if isinstance(item, dict) and "url" in item:
                      url = item["url"]
                      urls.append(url)
              
              with open("${{ env.OUTPUT_FILE }}", "w", encoding="utf-8") as out:
                  for url in urls:
                      out.write(url + "\n")
              
              print(f"Extracted {len(urls)} URLs to ${{ env.OUTPUT_FILE }}")
          else:
              print("Could not find lives array")
              exit(1)
          EOF
        env:
          SOURCE_FILE: "鱼壳海豚无18加"
          OUTPUT_FILE: "Lv/lives.txt"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Lv/lives.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update lives.txt from 鱼壳海豚无18加"
            git push
          fi
