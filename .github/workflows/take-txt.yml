name: take txt

on:
  push:
    branches:
      - main
    paths:
      - '鱼壳海豚无18加'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract URLs from lives
        run: |
          cat << 'EOF' > extract.py
          import os
          import re
          import json

          source_file = '鱼壳海豚无18加'
          output_file = 'Lv/lives.txt'

          if not os.path.exists(source_file):
              print(f"Error: Source file {source_file} not found.")
              exit(1)

          with open(source_file, 'r', encoding='utf-8') as f:
              content = f.read()

          # 1. 基础清理：移除单行和多行注释
          content_clean = re.sub(r'//.*', '', content)
          content_clean = re.sub(r'/\*.*?\*/', '', content_clean, flags=re.DOTALL)
          # 2. 修复非标准 JSON 中的尾部逗号（防止 json.loads 报错）
          content_clean = re.sub(r',\s*([\]}])', r'\1', content_clean)

          urls = []

          # 定义递归查找函数，可深入到任意嵌套层级寻找 url 和 urls
          def extract_urls_recursively(node):
              if isinstance(node, dict):
                  for k, v in node.items():
                      if k in ('url', 'urls'):
                          if isinstance(v, str):
                              urls.append(v)
                          elif isinstance(v, list):
                              for item in v:
                                  if isinstance(item, str):
                                      urls.append(item)
                      else:
                          extract_urls_recursively(v)
              elif isinstance(node, list):
                  for item in node:
                      if isinstance(item, str):
                          urls.append(item)
                      else:
                          extract_urls_recursively(item)

          # 尝试标准 JSON 递归解析
          try:
              data = json.loads(content_clean)
              if isinstance(data, dict) and 'lives' in data:
                  lives_data = data['lives']
                  if isinstance(lives_data, str):
                      urls.append(lives_data)
                  else:
                      extract_urls_recursively(lives_data)
          except Exception as e:
              # 容错：如果 JSON 解析失败，执行高容错正则深度提取
              print(f"JSON parse failed ({e}), falling back to regex extraction.")
              # 检查 lives 是否直接为单行字符串形式
              string_match = re.search(r'\"lives\"\s*:\s*\"([^\"]+)\"', content_clean)
              if string_match:
                  urls.append(string_match.group(1))
              else:
                  # 通过括号匹配，精准截取整个 "lives": [ ... ] 块
                  lives_index = content_clean.find('"lives"')
                  if lives_index != -1:
                      lives_segment = content_clean[lives_index:]
                      start_bracket = lives_segment.find('[')
                      if start_bracket != -1:
                          bracket_count = 0
                          block_chars = []
                          for char in lives_segment[start_bracket:]:
                              if char == '[':
                                  bracket_count += 1
                              elif char == ']':
                                  bracket_count -= 1
                              block_chars.append(char)
                              if bracket_count == 0:
                                  break
                          lives_block = "".join(block_chars)
                          
                          # 提取块内所有以 http/https/proxy/clan/file 开头的链接
                          raw_urls = re.findall(r'\"((?:https?|proxy|clan|file)://[^\"]+)\"', lives_block)
                          # 提取块内以 .txt 或 .m3u 结尾的值（防止协议头不标准）
                          txt_m3u_urls = re.findall(r'\"([^\"]+\.(?:txt|m3u)(?:\?[^\"]*)?)\"', lives_block)
                          urls.extend(raw_urls)
                          urls.extend(txt_m3u_urls)

          # 去重和过滤空白（保留原始顺序）
          unique_urls = []
          for url in urls:
              url = url.strip()
              if url and url not in unique_urls:
                  unique_urls.append(url)

          # 创建输出目录并写入
          os.makedirs(os.path.dirname(output_file), exist_ok=True)
          with open(output_file, 'w', encoding='utf-8') as f_out:
              for url in unique_urls:
                  f_out.write(url + '\n')

          print(f"Successfully saved {len(unique_urls)} URLs to {output_file}")
          EOF
          python extract.py
          rm extract.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Lv/lives.txt
          if git diff --staged --quiet; then
            echo "No changes in lives.txt, skipping commit."
          else
            git commit -m "Auto-update lives.txt [skip ci]"
            git push
          fi
